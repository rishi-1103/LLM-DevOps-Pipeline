name: CI/CD Pipeline — LLM Automation Service

# Triggers: run on every push to main, and on pull requests to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # GCP project configuration — set these in GitHub repository secrets
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1                          # Mumbai — lowest latency from India
  IMAGE_NAME: llm-automation-pipeline
  REGISTRY: asia-south1-docker.pkg.dev

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  # Runs on EVERY push including PRs. Cheapest check — runs in ~30 seconds.
  # Fail fast: if lint fails, we don't waste time building Docker image.
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install flake8 black

      - name: Run flake8 (style + syntax check)
        run: flake8 src/ --max-line-length=100 --exclude=__pycache__

      - name: Check formatting with black
        run: black --check src/

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  # Runs unit tests. Only proceeds if lint passed.
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint                                    # wait for lint to pass first
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          cd tests
          pytest test_pipeline.py -v --tb=short

  # ── Job 3: Build & Push Docker Image ────────────────────────────────────────
  # Only runs on push to main (not on PRs). Builds Docker image and pushes
  # to GCP Artifact Registry. Image is tagged with commit SHA for traceability.
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                                    # only build if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}   # stored as GitHub Secret

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image metadata
        id: meta
        run: |
          # Tag with commit SHA for full traceability — every deployed image
          # maps back to an exact commit in the repository
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Building image: ${IMAGE_TAG}"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.meta.outputs.image_tag }} \
            --tag ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:latest \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ steps.meta.outputs.image_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:latest

  # ── Job 4: Deploy to Cloud Run ───────────────────────────────────────────────
  # Deploys the newly built image to GCP Cloud Run.
  # Only runs after successful build on main branch.
  deploy:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production                        # requires manual approval if configured

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.IMAGE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ needs.build.outputs.image_tag }}
          flags: >
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --port=8080
          env_vars: |
            ENVIRONMENT=production

      - name: Verify deployment health
        run: |
          # Wait for Cloud Run to finish rolling out
          sleep 15
          SERVICE_URL=$(gcloud run services describe ${{ env.IMAGE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Service deployed at: ${SERVICE_URL}"
          # Hit the health endpoint to confirm the deployment is live
          curl --fail --silent "${SERVICE_URL}/health" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', f'Health check failed: {data}'
          print('Deployment verified — service is healthy')
          "

      - name: Output deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ needs.build.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** ${{ env.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Deployed and health-checked" >> $GITHUB_STEP_SUMMARY
